<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棋类对战平台</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"楷体","微软雅黑",serif;
        }

        /* -------------- 淡紫色首页 -------------- */
        .main-page{
            width:100vw;
            height:100vh;
            background:linear-gradient(135deg, #e6e6fa, #d8bfd8, thistle);
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            color:#5a4b94;
            text-shadow:0 0 8px rgba(255,255,255,0.5);
            position:relative;
            z-index:10;
            padding:20px;
        }
        .main-page.hide{
            display:none;
        }
        .main-title{
            font-size:60px;
            margin-bottom:40px;
            letter-spacing:8px;
        }
        .size-box{
            margin-bottom:30px;
            text-align:center;
            width:100%;
            max-width:750px;
        }
        .size-box h3{
            font-size:24px;
            margin-bottom:20px;
        }

        .size-btns{
            display:grid;
            grid-template-columns: repeat(6, 1fr);
            gap:15px;
            width:100%;
        }
        .size-btns button{
            width:100%;
            aspect-ratio: 1/1;
            font-size:32px;
            border:3px solid #9370db;
            background:rgba(147,112,219,0.2);
            color:#5a4b94;
            border-radius:16px;
            cursor:pointer;
            transition:0.3s;
        }
        .size-btns button.active{
            background:#9370db;
            color:white;
            font-weight:bold;
        }

        .game-btns{
            display:flex;
            gap:30px;
            margin-top:20px;
        }
        .game-btn{
            padding:20px 50px;
            font-size:28px;
            border:none;
            border-radius:12px;
            background:rgba(147,112,219,0.3);
            color:#5a4b94;
            border:2px solid #9370db;
            cursor:pointer;
            transition:0.3s;
        }
        .game-btn:hover{
            background:#9370db;
            color:white;
            transform:scale(1.05);
        }

        /* -------------- 游戏界面 -------------- */
        .game-page{
            width:100vw;
            height:100vh;
            background:#d3b88c;
            display:none;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:15px;
            gap: 12px;
        }
        .game-page.show{
            display:flex;
        }
        .game-header{
            font-size:32px;
            color:#3a2411;
            margin-bottom:5px;
            text-shadow:1px 1px 2px rgba(0,0,0,0.2);
        }
        .control-bar{
            display:flex;
            gap:10px;
            margin-top: 18px;
            flex-wrap:wrap;
            justify-content:center;
        }
        .ctrl-btn{
            padding:10px 18px;
            font-size:16px;
            border:none;
            border-radius:8px;
            background:#8b4513;
            color:white;
            cursor:pointer;
            border:1px solid #5a2e0a;
            transition:0.2s;
        }
        .ctrl-btn:hover{
            background:#a0522d;
        }
        .ctrl-btn.resign{
            background:#cd5c5c;
        }
        .ctrl-btn:disabled{
            background:#999;
            cursor:not-allowed;
        }
        .back-btn{
            position:absolute;
            top:20px;
            left:20px;
            padding:10px 20px;
            background:#8b4513;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        /* -------------- 美化棋盘 + 去掉中间的点 -------------- */
        .chess-board{
            display:grid;
            gap:1px;
            background:#5a3921;
            padding:20px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.35), 
                        0 0 0 4px rgba(255,248,220,0.3) inset;
            position:relative;
            border: 3px solid #cd853f;
        }
        .cell{
            width:34px;
            height:34px;
            background:linear-gradient(45deg, #fdf5e6, #faebd7);
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            position:relative;
            border: 1px solid #8b4513;
        }
        .piece{
            width:30px;
            height:30px;
            border-radius:50%;
            box-shadow:0 4px 8px rgba(0,0,0,0.4), 
                        inset 0 2px 3px rgba(255,255,255,0.4);
            position:relative;
            z-index:2;
        }
        .piece.black{
            background:radial-gradient(circle at 35% 35%, #444, #111);
        }
        .piece.white{
            background:radial-gradient(circle at 35% 35%, #fff, #f5f5f5);
            border:1px solid #777;
        }
    </style>
</head>
<body>
<!-- 淡紫色主界面 -->
<div class="main-page" id="mainPage">
    <h1 class="main-title">棋类对战平台</h1>
    <div class="size-box">
        <h3>选择棋盘大小（8-19）</h3>
        <div class="size-btns" id="sizeBtns"></div>
    </div>
    <div class="game-btns">
        <button class="game-btn" id="toGobang">五子棋</button>
        <button class="game-btn" id="toGo">围棋</button>
    </div>
</div>

<!-- 五子棋界面 -->
<div class="game-page" id="gobangPage">
    <button class="back-btn" id="back1">返回主页</button>
    <div class="game-header">五子棋对战</div>
    <div class="chess-board" id="gobangBoard"></div>
    <div class="control-bar">
        <button class="ctrl-btn" id="restart1">重新开始</button>
        <button class="ctrl-btn" id="undo1">悔棋一步</button>
        <button class="ctrl-btn resign" id="resign1">投子认负</button>
        <button class="ctrl-btn" id="save1">保存局面</button>
        <button class="ctrl-btn" id="load1">读取局面</button>
    </div>
</div>

<!-- 围棋界面 -->
<div class="game-page" id="goPage">
    <button class="back-btn" id="back2">返回主页</button>
    <div class="game-header">围棋对战</div>
    <div class="chess-board" id="goBoard"></div>
    <div class="control-bar">
        <button class="ctrl-btn" id="restart2">重新开始</button>
        <button class="ctrl-btn" id="undo2">悔棋一步</button>
        <button class="ctrl-btn" id="pass2">虚着</button>
        <button class="ctrl-btn resign" id="resign2">投子认负</button>
        <button class="ctrl-btn" id="save2">保存局面</button>
        <button class="ctrl-btn" id="load2">读取局面</button>
    </div>
</div>

<script>
    // ================= 设计模式：单例模式（UI管理器） =================
    // 负责UI交互、棋盘大小选择、页面切换，与游戏逻辑解耦
    class UIManager {
        static instance = null;
        static getInstance() {
            if (!UIManager.instance) {
                UIManager.instance = new UIManager();
            }
            return UIManager.instance;
        }

        constructor() {
            this.MIN_SIZE = 8;
            this.MAX_SIZE = 19;
            this.selectedSize = 8; // 默认选中8路棋盘
            this.currentGameType = null; // 当前游戏类型
            this.cellPool = new Map(); // 设计模式：享元模式 - 单元格DOM池

            // 初始化DOM引用
            this.dom = {
                mainPage: document.getElementById('mainPage'),
                gobangPage: document.getElementById('gobangPage'),
                goPage: document.getElementById('goPage'),
                sizeBtns: document.getElementById('sizeBtns'),
                toGobangBtn: document.getElementById('toGobang'),
                toGoBtn: document.getElementById('toGo'),
                back1Btn: document.getElementById('back1'),
                back2Btn: document.getElementById('back2'),
                // 五子棋控制按钮
                restart1Btn: document.getElementById('restart1'),
                undo1Btn: document.getElementById('undo1'),
                resign1Btn: document.getElementById('resign1'),
                save1Btn: document.getElementById('save1'),
                load1Btn: document.getElementById('load1'),
                // 围棋控制按钮
                restart2Btn: document.getElementById('restart2'),
                undo2Btn: document.getElementById('undo2'),
                pass2Btn: document.getElementById('pass2'),
                resign2Btn: document.getElementById('resign2'),
                save2Btn: document.getElementById('save2'),
                load2Btn: document.getElementById('load2'),
                // 棋盘容器
                gobangBoard: document.getElementById('gobangBoard'),
                goBoard: document.getElementById('goBoard')
            };

            // 初始化游戏逻辑管理器
            this.gameCore = GameCoreManager.getInstance();
            // 渲染棋盘大小选择按钮
            this.renderSizeButtons();
            // 绑定UI事件
            this.bindEvents();
        }

        // ================= 设计模式：享元模式（复用单元格DOM） =================
        getCell(r, c) {
            const key = `${r}-${c}-${this.currentGameType}`;
            if (this.cellPool.has(key)) {
                const cell = this.cellPool.get(key);
                cell.innerHTML = '';
                return cell;
            }
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.r = r;
            cell.dataset.c = c;
            this.cellPool.set(key, cell);
            return cell;
        }

        // 渲染棋盘大小选择按钮
        renderSizeButtons() {
            this.dom.sizeBtns.innerHTML = '';
            for (let i = this.MIN_SIZE; i <= this.MAX_SIZE; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                if (i === this.selectedSize) btn.classList.add('active');
                btn.onclick = () => {
                    document.querySelectorAll('.size-btns button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    this.selectedSize = i;
                };
                this.dom.sizeBtns.appendChild(btn);
            }
        }

        // 渲染棋盘（UI层渲染，调用享元池）
        renderBoard(boardEl, game) {
            boardEl.innerHTML = '';
            boardEl.style.gridTemplateColumns = `repeat(${game.size}, 34px)`;

            for (let r = 0; r < game.size; r++) {
                for (let c = 0; c < game.size; c++) {
                    const cell = this.getCell(r, c);
                    // 绑定落子事件（委托给游戏核心）
                    cell.onclick = () => {
                        const result = game.place(r, c);
                        if (result?.success) {
                            this.renderBoard(boardEl, game);
                            // 延迟弹窗，保证UI渲染完成
                            setTimeout(() => {
                                if (result.win) alert(`${result.winner === 'black' ? '黑方' : '白方'}获胜！`);
                                if (result.tie) alert('平局！');
                            }, 50);
                        }
                    };
                    // 渲染棋子
                    if (game.board[r][c]) {
                        const piece = document.createElement('div');
                        piece.className = `piece ${game.board[r][c]}`;
                        cell.appendChild(piece);
                    }
                    boardEl.appendChild(cell);
                }
            }
        }

        // 绑定所有UI事件
        bindEvents() {
            // 跳转到五子棋页面
            this.dom.toGobangBtn.onclick = () => {
                this.currentGameType = 'gobang';
                const game = this.gameCore.createGame('gobang', this.selectedSize);
                this.dom.mainPage.classList.add('hide');
                this.dom.gobangPage.classList.add('show');
                this.renderBoard(this.dom.gobangBoard, game);
                // 缓存当前游戏实例，供控制按钮使用
                this.gameCore.setCurrentGame(game, 'gobang');
            };

            // 跳转到围棋页面
            this.dom.toGoBtn.onclick = () => {
                this.currentGameType = 'go';
                const game = this.gameCore.createGame('go', this.selectedSize);
                this.dom.mainPage.classList.add('hide');
                this.dom.goPage.classList.add('show');
                this.renderBoard(this.dom.goBoard, game);
                this.gameCore.setCurrentGame(game, 'go');
            };

            // 返回主页
            this.dom.back1Btn.onclick = () => {
                this.dom.mainPage.classList.remove('hide');
                this.dom.gobangPage.classList.remove('show');
            };
            this.dom.back2Btn.onclick = () => {
                this.dom.mainPage.classList.remove('hide');
                this.dom.goPage.classList.remove('show');
            };

            // 五子棋控制事件
            this.dom.restart1Btn.onclick = () => {
                const game = this.gameCore.createGame('gobang', this.selectedSize);
                this.gameCore.setCurrentGame(game, 'gobang');
                this.renderBoard(this.dom.gobangBoard, game);
            };
            this.dom.undo1Btn.onclick = () => {
                const game = this.gameCore.getCurrentGame('gobang');
                if (game?.undo()) this.renderBoard(this.dom.gobangBoard, game);
            };
            this.dom.resign1Btn.onclick = () => {
                const game = this.gameCore.getCurrentGame('gobang');
                if (game) {
                    alert(`${game.curPlayer === 'black' ? '黑方' : '白方'}认输！`);
                    game.isOver = true;
                }
            };
            this.dom.save1Btn.onclick = () => {
                const game = this.gameCore.getCurrentGame('gobang');
                if (game) {
                    localStorage.setItem('gobang_save', JSON.stringify(game));
                    alert('五子棋局面保存成功！');
                }
            };
            this.dom.load1Btn.onclick = () => {
                const data = localStorage.getItem('gobang_save');
                if (!data) {
                    alert('无五子棋保存记录！');
                    return;
                }
                const gameData = JSON.parse(data);
                const game = this.gameCore.createGame('gobang', gameData.size);
                Object.assign(game, gameData);
                this.gameCore.setCurrentGame(game, 'gobang');
                this.renderBoard(this.dom.gobangBoard, game);
                alert('五子棋局面读取成功！');
            };

            // 围棋控制事件
            this.dom.restart2Btn.onclick = () => {
                const game = this.gameCore.createGame('go', this.selectedSize);
                this.gameCore.setCurrentGame(game, 'go');
                this.renderBoard(this.dom.goBoard, game);
            };
            this.dom.undo2Btn.onclick = () => {
                const game = this.gameCore.getCurrentGame('go');
                if (game?.undo()) this.renderBoard(this.dom.goBoard, game);
            };
            this.dom.pass2Btn.onclick = () => {
                const game = this.gameCore.getCurrentGame('go');
                if (game) {
                    game.pass();
                    this.renderBoard(this.dom.goBoard, game);
                }
            };
            this.dom.resign2Btn.onclick = () => {
                const game = this.gameCore.getCurrentGame('go');
                if (game) {
                    alert(`${game.curPlayer === 'black' ? '黑方' : '白方'}认输！`);
                    game.isOver = true;
                }
            };
            this.dom.save2Btn.onclick = () => {
                const game = this.gameCore.getCurrentGame('go');
                if (game) {
                    localStorage.setItem('go_save', JSON.stringify(game));
                    alert('围棋局面保存成功！');
                }
            };
            this.dom.load2Btn.onclick = () => {
                const data = localStorage.getItem('go_save');
                if (!data) {
                    alert('无围棋保存记录！');
                    return;
                }
                const gameData = JSON.parse(data);
                const game = this.gameCore.createGame('go', gameData.size);
                Object.assign(game, gameData);
                this.gameCore.setCurrentGame(game, 'go');
                this.renderBoard(this.dom.goBoard, game);
                alert('围棋局面读取成功！');
            };
        }
    }

    // ================= 设计模式：抽象工厂模式 + 模板方法模式（游戏核心） =================
    class GameCoreManager {
        static instance = null;
        static getInstance() {
            if (!GameCoreManager.instance) {
                GameCoreManager.instance = new GameCoreManager();
            }
            return GameCoreManager.instance;
        }

        constructor() {
            this.gameInstances = { // 缓存当前游戏实例
                gobang: null,
                go: null
            };
        }

        // 设计模式：抽象工厂 - 创建对应游戏实例
        createGame(type, size) {
            switch (type) {
                case 'gobang':
                    return new GobangGame(size);
                case 'go':
                    return new GoGame(size);
                default:
                    throw new Error('不支持的游戏类型');
            }
        }

        // 设置当前游戏实例
        setCurrentGame(game, type) {
            this.gameInstances[type] = game;
        }

        // 获取当前游戏实例
        getCurrentGame(type) {
            return this.gameInstances[type];
        }
    }

    // ================= 设计模式：备忘录模式（游戏状态保存） =================
    class GameMemento {
        constructor(board, curPlayer, isOver, size) {
            this.board = JSON.parse(JSON.stringify(board));
            this.curPlayer = curPlayer;
            this.isOver = isOver;
            this.size = size;
        }
    }

    // ================= 设计模式：模板方法模式（游戏基类） =================
    class BaseGame {
        constructor(size) {
            this.size = size;
            this.curPlayer = 'black';
            this.board = Array(size).fill().map(() => Array(size).fill(null));
            this.isOver = false;
            this.history = []; // 备忘录列表
        }

        // 模板方法：保存状态
        save() {
            this.history.push(new GameMemento(this.board, this.curPlayer, this.isOver, this.size));
        }

        // 模板方法：悔棋（恢复状态）
        undo() {
            if (!this.history.length) return false;
            const memento = this.history.pop();
            this.board = memento.board;
            this.curPlayer = memento.curPlayer;
            this.isOver = memento.isOver;
            this.size = memento.size;
            return true;
        }

        // 模板方法：切换玩家
        switchP() {
            this.curPlayer = this.curPlayer === 'black' ? 'white' : 'black';
        }

        // 模板方法：校验坐标合法性
        valid(r, c) {
            return r >= 0 && r < this.size && c >= 0 && c < this.size;
        }

        // 抽象方法：落子（子类实现）
        place(r, c) { throw new Error('子类必须实现place方法'); }

        // 抽象方法：胜负判断（子类实现）
        checkWin(r, c) { throw new Error('子类必须实现checkWin方法'); }
    }

    // ================= 五子棋子类（实现模板方法） =================
    class GobangGame extends BaseGame {
        place(r, c) {
            if (!this.valid(r, c) || this.board[r][c] || this.isOver) return { success: false };
            
            this.save(); // 模板方法：保存状态
            this.board[r][c] = this.curPlayer;

            let win = false;
            let tie = false;
            // 胜负判断
            if (this.checkWin(r, c)) {
                win = true;
                this.isOver = true;
            }
            // 平局判断
            else if (this.board.flat().every(e => e)) {
                tie = true;
                this.isOver = true;
            }

            // 切换玩家（未结束时）
            if (!win && !tie) this.switchP();

            return {
                success: true,
                win,
                tie,
                winner: this.curPlayer
            };
        }

        checkWin(r, c) {
            const dirs = [[0, 1], [1, 0], [1, 1], [1, -1]];
            const col = this.board[r][c];
            for (let [dx, dy] of dirs) {
                let cnt = 1;
                // 正向统计
                for (let i = 1; i < 5; i++) {
                    const nr = r + dx * i, nc = c + dy * i;
                    if (!this.valid(nr, nc) || this.board[nr][nc] !== col) break;
                    cnt++;
                }
                // 反向统计
                for (let i = 1; i < 5; i++) {
                    const nr = r - dx * i, nc = c - dy * i;
                    if (!this.valid(nr, nc) || this.board[nr][nc] !== col) break;
                    cnt++;
                }
                if (cnt >= 5) return true;
            }
            return false;
        }
    }

    // ================= 围棋子类（实现模板方法） =================
    class GoGame extends BaseGame {
        constructor(size) {
            super(size);
            this.passCnt = 0; // 虚着计数
        }

        // 辅助方法：获取棋组
        getGroup(r, c, vis = new Set()) {
            const col = this.board[r][c];
            const g = [], st = [[r, c]];
            while (st.length) {
                const [x, y] = st.pop();
                const k = `${x},${y}`;
                if (vis.has(k)) continue;
                vis.add(k);
                g.push([x, y]);
                [[-1, 0], [1, 0], [0, -1], [0, 1]].forEach(([dx, dy]) => {
                    const nx = x + dx, ny = y + dy;
                    if (this.valid(nx, ny) && !vis.has(`${nx},${ny}`) && this.board[nx][ny] === col) {
                        st.push([nx, ny]);
                    }
                });
            }
            return g;
        }

        // 辅助方法：计算气数
        getLib(r, c) {
            const g = this.getGroup(r, c);
            const s = new Set();
            g.forEach(([x, y]) => {
                [[-1, 0], [1, 0], [0, -1], [0, 1]].forEach(([dx, dy]) => {
                    const nx = x + dx, ny = y + dy;
                    if (this.valid(nx, ny) && !this.board[nx][ny]) s.add(`${nx},${ny}`);
                });
            });
            return s.size;
        }

        // 辅助方法：移除死子
        removeDead() {
            const enemy = this.curPlayer === 'black' ? 'white' : 'black';
            const vis = new Set();
            for (let i = 0; i < this.size; i++) {
                for (let j = 0; j < this.size; j++) {
                    if (this.board[i][j] === enemy && !vis.has(`${i},${j}`)) {
                        this.getGroup(i, j, vis);
                        if (this.getLib(i, j) === 0) {
                            this.getGroup(i, j).forEach(([x, y]) => this.board[x][y] = null);
                        }
                    }
                }
            }
        }

        // 实现落子逻辑
        place(r, c) {
            if (!this.valid(r, c) || this.board[r][c] || this.isOver) return false;
            
            this.save(); // 模板方法：保存状态
            this.board[r][c] = this.curPlayer;
            this.removeDead(); // 移除死子

            // 禁着点判断
            if (this.getLib(r, c) === 0) {
                this.undo(); // 模板方法：悔棋
                alert('禁着点，不能落子！');
                return false;
            }

            this.passCnt = 0;
            this.switchP(); // 模板方法：切换玩家
            return { success: true };
        }

        // 实现虚着逻辑
        pass() {
            if (this.isOver) return;
            this.passCnt++;
            if (this.passCnt >= 2) {
                const black = this.board.flat().filter(e => e === 'black').length;
                const total = this.size * this.size;
                const need = total / 2 + 3.75;
                alert(black > need ? `黑方胜 ${(black - need).toFixed(2)}子` : `白方胜 ${(need - black).toFixed(2)}子`);
                this.isOver = true;
            } else {
                this.switchP(); // 模板方法：切换玩家
            }
        }

        // 围棋无需checkWin，重写为空
        checkWin() { return false; }
    }

    // 初始化UI管理器（单例）
    window.onload = () => {
        UIManager.getInstance();
    };
</script>
</body>
