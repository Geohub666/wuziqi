<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复古棋类对战平台</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"楷体","微软雅黑",serif;
        }

        /* -------------- 淡紫色首页 -------------- */
        .main-page{
            width:100vw;
            height:100vh;
            background:linear-gradient(135deg, #e6e6fa, #d8bfd8, thistle);
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            color:#5a4b94;
            text-shadow:0 0 8px rgba(255,255,255,0.5);
            position:relative;
            z-index:10;
            padding:20px;
        }
        .main-page.hide{
            display:none;
        }
        .main-title{
            font-size:60px;
            margin-bottom:40px;
            letter-spacing:8px;
        }
        .size-box{
            margin-bottom:30px;
            text-align:center;
            width:100%;
            max-width:750px;
        }
        .size-box h3{
            font-size:24px;
            margin-bottom:20px;
        }

        .size-btns{
            display:grid;
            grid-template-columns: repeat(6, 1fr);
            gap:15px;
            width:100%;
        }
        .size-btns button{
            width:100%;
            aspect-ratio: 1/1;
            font-size:32px;
            border:3px solid #9370db;
            background:rgba(147,112,219,0.2);
            color:#5a4b94;
            border-radius:16px;
            cursor:pointer;
            transition:0.3s;
        }
        .size-btns button.active{
            background:#9370db;
            color:white;
            font-weight:bold;
        }

        .game-btns{
            display:flex;
            gap:30px;
            margin-top:20px;
        }
        .game-btn{
            padding:20px 50px;
            font-size:28px;
            border:none;
            border-radius:12px;
            background:rgba(147,112,219,0.3);
            color:#5a4b94;
            border:2px solid #9370db;
            cursor:pointer;
            transition:0.3s;
        }
        .game-btn:hover{
            background:#9370db;
            color:white;
            transform:scale(1.05);
        }

        /* -------------- 游戏界面 -------------- */
        .game-page{
            width:100vw;
            height:100vh;
            background:#d3b88c;
            display:none;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:15px;
            gap: 12px;
        }
        .game-page.show{
            display:flex;
        }
        .game-header{
            font-size:32px;
            color:#3a2411;
            margin-bottom:5px;
            text-shadow:1px 1px 2px rgba(0,0,0,0.2);
        }
        .control-bar{
            display:flex;
            gap:10px;
            margin-top: 18px;
            flex-wrap:wrap;
            justify-content:center;
        }
        .ctrl-btn{
            padding:10px 18px;
            font-size:16px;
            border:none;
            border-radius:8px;
            background:#8b4513;
            color:white;
            cursor:pointer;
            border:1px solid #5a2e0a;
            transition:0.2s;
        }
        .ctrl-btn:hover{
            background:#a0522d;
        }
        .ctrl-btn.resign{
            background:#cd5c5c;
        }
        .ctrl-btn:disabled{
            background:#999;
            cursor:not-allowed;
        }
        .back-btn{
            position:absolute;
            top:20px;
            left:20px;
            padding:10px 20px;
            background:#8b4513;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        /* -------------- 美化棋盘 + 去掉中间的点 -------------- */
        .chess-board{
            display:grid;
            gap:1px;
            background:#5a3921;
            padding:20px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.35), 
                        0 0 0 4px rgba(255,248,220,0.3) inset;
            position:relative;
            border: 3px solid #cd853f;
        }
        .cell{
            width:34px;
            height:34px;
            background:linear-gradient(45deg, #fdf5e6, #faebd7);
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            position:relative;
            border: 1px solid #8b4513;
        }
        .piece{
            width:30px;
            height:30px;
            border-radius:50%;
            box-shadow:0 4px 8px rgba(0,0,0,0.4), 
                        inset 0 2px 3px rgba(255,255,255,0.4);
            position:relative;
            z-index:2;
        }
        .piece.black{
            background:radial-gradient(circle at 35% 35%, #444, #111);
        }
        .piece.white{
            background:radial-gradient(circle at 35% 35%, #fff, #f5f5f5);
            border:1px solid #777;
        }
    </style>
</head>
<body>

<!-- 淡紫色主界面 -->
<div class="main-page" id="mainPage">
    <h1 class="main-title">棋类对战平台</h1>
    <div class="size-box">
        <h3>选择棋盘大小（8-19）</h3>
        <div class="size-btns" id="sizeBtns"></div>
    </div>
    <div class="game-btns">
        <button class="game-btn" id="toGobang">五子棋</button>
        <button class="game-btn" id="toGo">围棋</button>
    </div>
</div>

<!-- 五子棋界面 -->
<div class="game-page" id="gobangPage">
    <button class="back-btn" id="back1">返回主页</button>
    <div class="game-header">五子棋对战</div>
    <div class="chess-board" id="gobangBoard"></div>
    <div class="control-bar">
        <button class="ctrl-btn" id="restart1">重新开始</button>
        <button class="ctrl-btn" id="undo1">悔棋一步</button>
        <button class="ctrl-btn resign" id="resign1">投子认负</button>
        <button class="ctrl-btn" id="save1">保存局面</button>
        <button class="ctrl-btn" id="load1">读取局面</button>
    </div>
</div>

<!-- 围棋界面 -->
<div class="game-page" id="goPage">
    <button class="back-btn" id="back2">返回主页</button>
    <div class="game-header">围棋对战</div>
    <div class="chess-board" id="goBoard"></div>
    <div class="control-bar">
        <button class="ctrl-btn" id="restart2">重新开始</button>
        <button class="ctrl-btn" id="undo2">悔棋一步</button>
        <button class="ctrl-btn" id="pass2">虚着</button>
        <button class="ctrl-btn resign" id="resign2">投子认负</button>
        <button class="ctrl-btn" id="save2">保存局面</button>
        <button class="ctrl-btn" id="load2">读取局面</button>
    </div>
</div>

<script>
    // 全局配置
    const MIN_SIZE = 8, MAX_SIZE = 19;
    let selectSize = 8;
    let gobangGame, goGame;

    // -------------- 备忘录模式 --------------
    class Memento{
        constructor(board,curPlayer,isOver,size){
            this.board = JSON.parse(JSON.stringify(board));
            this.curPlayer = curPlayer;
            this.isOver = isOver;
            this.size = size;
        }
    }

    // -------------- 抽象游戏基类 --------------
    class BaseGame{
        constructor(size){
            this.size = size;
            this.curPlayer = "black";
            this.board = Array(size).fill().map(()=>Array(size).fill(null));
            this.isOver = false;
            this.history = [];
        }
        save(){ this.history.push(new Memento(this.board,this.curPlayer,this.isOver,this.size)); }
        undo(){
            if(!this.history.length) return false;
            const m = this.history.pop();
            this.board = m.board;
            this.curPlayer = m.curPlayer;
            this.isOver = m.isOver;
            this.size = m.size;
            return true;
        }
        switchP(){ this.curPlayer = this.curPlayer==="black"?"white":"black"; }
        valid(r,c){ return r>=0&&r<this.size&&c>=0&&c<this.size; }
        place(r,c){}
        checkWin(r,c){}
    }

    // -------------- 五子棋（核心修改：先落子，后弹窗） --------------
    class Gobang extends BaseGame{
        place(r,c){
            if(!this.valid(r,c)||this.board[r][c]||this.isOver) return false;
            this.save();
            // 先落子
            this.board[r][c] = this.curPlayer;
            
            // 判断是否胜利/平局
            let win = false;
            let tie = false;
            
            if(this.checkWin(r,c)){
                win = true;
                this.isOver = true;
            }else if(this.board.flat().every(e=>e)){
                tie = true;
                this.isOver = true;
            }

            // 切换玩家
            if(!win && !tie){
                this.switchP();
            }
            
            // 返回是否需要显示弹窗（胜利/平局）
            return { success: true, win, tie, winner: this.curPlayer };
        }
        checkWin(r,c){
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            const col = this.board[r][c];
            for(let [dx,dy] of dirs){
                let cnt=1;
                for(let i=1;i<5;i++){
                    let nr=r+dx*i, nc=c+dy*i;
                    if(!this.valid(nr,nc)||this.board[nr][nc]!==col) break;
                    cnt++;
                }
                for(let i=1;i<5;i++){
                    let nr=r-dx*i, nc=c-dy*i;
                    if(!this.valid(nr,nc)||this.board[nr][nc]!==col) break;
                    cnt++;
                }
                if(cnt>=5) return true;
            }
            return false;
        }
    }

    // -------------- 围棋 --------------
    class Go extends BaseGame{
        constructor(size){
            super(size);
            this.passCnt=0;
        }
        getGroup(r,c,vis=new Set()){
            const col = this.board[r][c];
            const g=[], st=[[r,c]];
            while(st.length){
                const [x,y]=st.pop();
                const k=`${x},${y}`;
                if(vis.has(k)) continue;
                vis.add(k); g.push([x,y]);
                [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dx,dy])=>{
                    let nx=x+dx, ny=y+dy;
                    if(this.valid(nx,ny)&&!vis.has(`${nx},${ny}`)&&this.board[nx][ny]===col) st.push([nx,ny]);
                });
            }
            return g;
        }
        getLib(r,c){
            const g=this.getGroup(r,c);
            const s=new Set();
            g.forEach(([x,y])=>{
                [[-1,0],[1,0],[0,1]].forEach(([dx,dy])=>{
                    let nx=x+dx, ny=y+dy;
                    if(this.valid(nx,ny)&&!this.board[nx][ny]) s.add(`${nx},${ny}`);
                });
            });
            return s.size;
        }
        removeDead(){
            const e = this.curPlayer==="black"?"white":"black";
            const vis=new Set();
            for(let i=0;i<this.size;i++){
                for(let j=0;j<this.size;j++){
                    if(this.board[i][j]===e&&!vis.has(`${i},${j}`)){
                        this.getGroup(i,j,vis);
                        if(this.getLib(i,j)===0){
                            this.getGroup(i,j).forEach(([x,y])=>this.board[x][y]=null);
                        }
                    }
                }
            }
        }
        place(r,c){
            if(!this.valid(r,c)||this.board[r][c]||this.isOver) return false;
            this.save();
            this.board[r][c] = this.curPlayer;
            this.removeDead();
            if(this.getLib(r,c)===0){
                this.undo();
                alert("禁着点！");
                return false;
            }
            this.passCnt=0;
            this.switchP();
            return true;
        }
        pass(){
            this.passCnt++;
            if(this.passCnt>=2){
                let b = this.board.flat().filter(e=>e==="black").length;
                let need = this.size*this.size/2+3.75;
                alert(b>need?`黑胜${(b-need).toFixed(2)}子`:`白胜${(need-b).toFixed(2)}子`);
                this.isOver=true;
            }else{
                this.switchP();
            }
        }
    }

    // -------------- 渲染大小按钮 --------------
    function renderSize(){
        const box = document.getElementById("sizeBtns");
        box.innerHTML="";
        for(let i=MIN_SIZE;i<=MAX_SIZE;i++){
            const b=document.createElement("button");
            b.textContent=i;
            if(i===selectSize) b.classList.add("active");
            b.onclick=()=>{
                document.querySelectorAll(".size-btns button").forEach(e=>e.classList.remove("active"));
                b.classList.add("active");
                selectSize=i;
            };
            box.appendChild(b);
        }
    }

    // -------------- 渲染棋盘 --------------
    function renderBoard(eleId,game){
        const el=document.getElementById(eleId);
        el.innerHTML="";
        el.style.gridTemplateColumns=`repeat(${game.size},34px)`;
        for(let i=0;i<game.size;i++){
            for(let j=0;j<game.size;j++){
                const c=document.createElement("div");
                c.className="cell";
                c.onclick=()=>{
                    // 落子
                    const result = game.place(i,j);
                    if(result.success){
                        // 先渲染棋子到界面
                        renderBoard(eleId,game);
                        
                        // 渲染完成后，再弹出提示
                        setTimeout(()=>{
                            if(result.win){
                                alert(`${result.winner==="black"?"黑方":"白方"}获胜！`);
                            }else if(result.tie){
                                alert("平局！");
                            }
                        }, 50);
                    }
                };
                if(game.board[i][j]){
                    const p=document.createElement("div");
                    p.className=`piece ${game.board[i][j]}`;
                    c.appendChild(p);
                }
                el.appendChild(c);
            }
        }
    }

    // -------------- 初始化 --------------
    window.onload=()=>{
        renderSize();
        // 主页跳转
        document.getElementById("toGobang").onclick=()=>{
            gobangGame = new Gobang(selectSize);
            document.getElementById("mainPage").classList.add("hide");
            document.getElementById("gobangPage").classList.add("show");
            renderBoard("gobangBoard",gobangGame);
        };
        document.getElementById("toGo").onclick=()=>{
            goGame = new Go(selectSize);
            document.getElementById("mainPage").classList.add("hide");
            document.getElementById("goPage").classList.add("show");
            renderBoard("goBoard",goGame);
        };
        // 返回
        document.getElementById("back1").onclick=()=>{
            document.getElementById("mainPage").classList.remove("hide");
            document.getElementById("gobangPage").classList.remove("show");
        };
        document.getElementById("back2").onclick=()=>{
            document.getElementById("mainPage").classList.remove("hide");
            document.getElementById("goPage").classList.remove("show");
        };

        // 五子棋控制
        document.getElementById("restart1").onclick=()=>{gobangGame=new Gobang(selectSize);renderBoard("gobangBoard",gobangGame);};
        document.getElementById("undo1").onclick=()=>{if(gobangGame.undo())renderBoard("gobangBoard",gobangGame);};
        document.getElementById("resign1").onclick=()=>{alert(`${gobangGame.curPlayer==="black"?"黑方":"白方"}认输`);gobangGame.isOver=true;};
        document.getElementById("save1").onclick=()=>{localStorage.setItem("gobang",JSON.stringify(gobangGame));alert("保存成功");};
        document.getElementById("load1").onclick=()=>{
            const d=localStorage.getItem("gobang");
            if(d){gobangGame=Object.assign(new Gobang(selectSize),JSON.parse(d));renderBoard("gobangBoard",gobangGame);alert("读取成功");}
        };

        // 围棋控制
        document.getElementById("restart2").onclick=()=>{goGame=new Go(selectSize);renderBoard("goBoard",goGame);};
        document.getElementById("undo2").onclick=()=>{if(goGame.undo())renderBoard("goBoard",goGame);};
        document.getElementById("pass2").onclick=()=>{goGame.pass();renderBoard("goBoard",goGame);};
        document.getElementById("resign2").onclick=()=>{alert(`${goGame.curPlayer==="black"?"黑方":"白方"}认输`);goGame.isOver=true;};
        document.getElementById("save2").onclick=()=>{localStorage.setItem("go",JSON.stringify(goGame));alert("保存成功");};
        document.getElementById("load2").onclick=()=>{
            const d=localStorage.getItem("go");
            if(d){goGame=Object.assign(new Go(selectSize),JSON.parse(d));renderBoard("goBoard",goGame);alert("读取成功");}
        };
    };
</script>
</body>
</html>
